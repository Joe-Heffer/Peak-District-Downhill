name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry-1.outputs.page_url || steps.deployment-retry-2.outputs.page_url }}
    steps:
      # actions/deploy-pages intermittently fails with "Deployment failed, try
      # again later" due to transient GitHub Pages backend issues (see
      # https://github.com/actions/deploy-pages/issues/406). Retry a couple of
      # times before giving up, rather than requiring a manual re-run.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - id: deployment-retry-1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-1.outcome == 'failure'
        run: sleep 15

      - id: deployment-retry-2
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-1.outcome == 'failure'
        uses: actions/deploy-pages@v4
