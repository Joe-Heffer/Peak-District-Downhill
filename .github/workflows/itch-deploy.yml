name: Deploy to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:itch
      - name: Setup butler
        uses: remarkablegames/setup-butler@v3

      - name: Publish to itch.io
        run: butler push dist-itch joe-heffer/gravity-and-grit:html5
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
