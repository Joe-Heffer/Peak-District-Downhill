<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Peak District Downhill</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="credits"></div>
    <button id="mute-btn" type="button" aria-pressed="false" aria-label="Mute music">&#128266;</button>
    <div id="controls">
      <div id="steer-group">
        <div id="steer-left" class="control-zone">&#8592;</div>
        <div id="steer-right" class="control-zone">&#8594;</div>
      </div>
      <div id="action-group">
        <div id="brake-btn" class="control-zone control-zone--brake">BRAKE</div>
        <div id="jump-btn" class="control-zone control-zone--jump">JUMP</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
