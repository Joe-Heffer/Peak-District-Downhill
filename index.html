<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Gravity & Grit: Peak District Downhill</title>
    <meta name="description" content="A free browser-based 3D downhill mountain-biking game. Ride real Peak District bridleways as Gravity and Grit, built with Three.js and cannon-es." />
    <meta name="theme-color" content="#3d2f56" />
    <link rel="canonical" href="https://joe-heffer.github.io/Peak-District-Downhill/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gravity & Grit: Peak District Downhill" />
    <meta property="og:title" content="Gravity & Grit: Peak District Downhill" />
    <meta property="og:description" content="A free browser-based 3D downhill mountain-biking game. Ride real Peak District bridleways as Gravity and Grit, built with Three.js and cannon-es." />
    <meta property="og:url" content="https://joe-heffer.github.io/Peak-District-Downhill/" />
    <meta property="og:image" content="https://joe-heffer.github.io/Peak-District-Downhill/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Gravity & Grit: Peak District Downhill — a mountain biker jumps off a gritstone ledge over Peak District moorland at sunset." />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gravity & Grit: Peak District Downhill" />
    <meta name="twitter:description" content="A free browser-based 3D downhill mountain-biking game. Ride real Peak District bridleways as Gravity and Grit." />
    <meta name="twitter:image" content="https://joe-heffer.github.io/Peak-District-Downhill/assets/og-image.png" />
    <meta name="twitter:image:alt" content="Gravity & Grit: Peak District Downhill — a mountain biker jumps off a gritstone ledge over Peak District moorland at sunset." />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="hud-topleft">
      <div id="credits"></div>
      <div id="location"></div>
      <div id="stamina-bar"><div id="stamina-bar-fill"></div></div>
    </div>
    <div id="hud-score">
      <div id="score-value">0</div>
      <div id="combo-value"></div>
      <div id="score-best"></div>
    </div>
    <div id="score-popups"></div>
    <canvas id="minimap"></canvas>
    <button id="mute-btn" type="button" aria-pressed="false" aria-label="Mute music">&#128266;</button>
    <button id="feedback-btn" type="button" aria-label="Report a bug or give feedback">&#128030;</button>
    <button id="tilt-btn" type="button" hidden aria-pressed="false" aria-label="Enable tilt steering">&#128241;</button>
    <div id="devtools" hidden></div>
    <div id="controls">
      <div id="steer-group">
        <div id="steer-left" class="control-zone">&#8592;</div>
        <div id="steer-right" class="control-zone">&#8594;</div>
      </div>
      <div id="action-group">
        <div id="brake-btn" class="control-zone control-zone--brake">BRAKE</div>
        <div id="boost-btn" class="control-zone control-zone--boost">BOOST</div>
        <div id="jump-btn" class="control-zone control-zone--jump">JUMP</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
